name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "cpanel-deploy"
  # Queue new deploys instead of cancelling a running one — cancelling mid-rsync
  # could leave the server in a partial state. New pushes wait, then run in order.
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Node 24 (npm 11) — matches the npm that generates package-lock.json,
          # so `npm ci` validates the lock; also satisfies lint-staged/listr2 engines.
          node-version: 24
          cache: npm

      - run: npm ci

      # Quality gate — a failure here stops the deploy (no broken code reaches prod).
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

      - run: npm run build
        env:
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_KEY }}
          NEXT_PUBLIC_SITE_URL: https://violingardencollection.com

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync over SSH
        run: |
          # --delete-after: upload everything first, delete stale files only at
          # the end — so an interrupted run never deletes without having uploaded.
          rsync -avz --delete-after \
            --exclude='.htaccess' \
            --exclude='cgi-bin/' \
            --exclude='.DS_Store' \
            --exclude='*.zip' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key" \
            ./out/ \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_TARGET }}"
